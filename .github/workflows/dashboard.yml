name: Dashboard CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - ".golangci.yml"
      - ".golangci-lint-version"
      - "taskfile"
      - "tools/quality/**"
      - ".github/workflows/dashboard.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - ".golangci.yml"
      - ".golangci-lint-version"
      - "taskfile"
      - "tools/quality/**"
      - ".github/workflows/dashboard.yml"
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Go test (dashboard packages)
        run: |
          ./taskfile dashboard:test

  lint-pr:
    name: Lint New Issues
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run golangci-lint on new issues
        uses: golangci/golangci-lint-action@v9
        with:
          version-file: .golangci-lint-version
          only-new-issues: true
          args: --whole-files

  lint-advisory:
    name: Lint Full Repository (Advisory)
    if: github.event_name == 'pull_request'
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run full golangci-lint backlog report
        uses: golangci/golangci-lint-action@v9
        with:
          version-file: .golangci-lint-version
          args: --issues-exit-code=0

  lint-main:
    name: Lint Full Repository
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run golangci-lint on full repository
        uses: golangci/golangci-lint-action@v9
        with:
          version-file: .golangci-lint-version
