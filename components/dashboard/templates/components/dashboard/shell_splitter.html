<div class="dashboard-shell__splitter"
  data-shell-resize="{{ region.id }}"
  role="separator"
  aria-orientation="vertical"
  aria-label="{{ region.label }} resize"
  aria-controls="dashboard-shell-region-{{ region.id }}"
  aria-valuemin="{{ region.sizing.min }}"
  aria-valuemax="{{ region.sizing.max }}"
  aria-valuenow="{{ region.sizing.default }}"
  tabindex="0"></div>
